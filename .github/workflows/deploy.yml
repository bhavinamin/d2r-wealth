name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: /srv/d2-wealth
      RELEASE_DIR: /srv/d2-wealth/releases/${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Create release archive
        run: git archive --format=tar.gz --output=deploy.tgz HEAD

      - name: Upload release archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: deploy.tgz
          target: ${{ env.RELEASE_DIR }}
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            mkdir -p "${{ env.RELEASE_DIR }}"
            cd "${{ env.RELEASE_DIR }}"
            tar -xzf deploy.tgz
            rm -f deploy.tgz
            APP_ROOT="${{ env.DEPLOY_PATH }}" RELEASE_DIR="${{ env.RELEASE_DIR }}" bash deploy/deploy.sh

      - name: Smoke-test production
        run: |
          echo "Waiting for d2r.bjav.io health..."
          curl -fS --retry 5 --retry-delay 5 https://d2r.bjav.io/health
