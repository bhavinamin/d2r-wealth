name: CI

on:
  push:
    branches:
      - master
      - "task/**"
  pull_request:
  workflow_dispatch:

jobs:
  parser-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare parser runtime data
        run: npm run patch:d2-parser && npm run generate:market

      - name: Run parser fixture tests
        run: npm run test:parser

  integration-tests:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare gateway runtime data
        run: npm run patch:d2-parser && npm run generate:market

      - name: Run backend and gateway integration tests
        run: npm run test:integration

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

  native-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build native gateway
        run: dotnet build ./native-gateway/D2Wealth.Gateway.Win/D2Wealth.Gateway.Win.csproj -c Release
